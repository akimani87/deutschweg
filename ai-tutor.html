<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI Tutor — DeutschWeg</title>
<link rel="stylesheet" href="./deutschweg-theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#FFFFFF;
    color:#1F2937;
    font-family:'Plus Jakarta Sans','DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;
    min-height:100dvh;
    display:flex;flex-direction:column;
  }

  /* ── HEADER ── */
  .tutor-header{
    background:linear-gradient(135deg,#1D4ED8 0%,#3B82F6 100%);
    color:#fff;
    padding:14px 16px 12px;
    display:flex;align-items:center;gap:12px;
    flex-shrink:0;
    box-shadow:0 2px 12px rgba(29,78,216,0.18);
    position:sticky;top:0;z-index:30;
  }
  .tutor-back{
    background:rgba(255,255,255,0.16);border:none;color:#fff;
    width:36px;height:36px;border-radius:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:700;flex-shrink:0;
    text-decoration:none;transition:background .2s;
  }
  .tutor-back:hover{background:rgba(255,255,255,0.26);}
  .tutor-avatar-h{
    width:40px;height:40px;border-radius:50%;
    background:#fff;display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.18);
  }
  .tutor-title-wrap{flex:1;min-width:0;}
  .tutor-title{font-size:16px;font-weight:800;line-height:1.2;letter-spacing:-0.2px;}
  .tutor-status{
    font-size:11px;font-weight:600;color:rgba(255,255,255,0.88);
    margin-top:2px;display:flex;align-items:center;gap:6px;
  }
  .tutor-dot{width:7px;height:7px;border-radius:50%;background:#10B981;box-shadow:0 0 6px #10B981;}

  /* ── LEVEL PILLS ── */
  .level-bar{
    background:#fff;
    border-bottom:1px solid #E5E7EB;
    padding:10px 14px;
    display:flex;justify-content:center;gap:6px;
    flex-shrink:0;
    position:sticky;top:62px;z-index:25;
  }
  .level-pill{
    border:1.5px solid #E5E7EB;
    background:#F8FAFC;
    color:#475569;
    border-radius:18px;
    padding:6px 16px;
    font-family:inherit;font-size:13px;font-weight:700;letter-spacing:0.3px;
    cursor:pointer;
    transition:all .18s ease;
  }
  .level-pill:hover{border-color:#3B82F6;color:#3B82F6;}
  .level-pill.active{
    background:#3B82F6;color:#fff;border-color:#3B82F6;
    box-shadow:0 2px 8px rgba(59,130,246,0.3);
  }

  /* ── CHAT AREA ── */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:18px 14px 14px;
    display:flex;flex-direction:column;gap:12px;
    max-width:760px;width:100%;margin:0 auto;
    -webkit-overflow-scrolling:touch;
  }

  .msg{
    display:flex;align-items:flex-end;gap:8px;
    max-width:90%;
    animation:slideIn .22s ease;
  }
  @keyframes slideIn{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.tutor{align-self:flex-start;}

  .msg-av{
    width:32px;height:32px;border-radius:50%;
    background:#EFF6FF;border:1.5px solid #DBEAFE;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;
  }

  .bubble{
    padding:11px 14px;
    border-radius:18px;
    font-size:14.5px;line-height:1.65;
    white-space:pre-wrap;word-break:break-word;
  }
  .msg.tutor .bubble{
    background:#F8FAFC;
    border:1px solid #E5E7EB;
    color:#1F2937;
    border-bottom-left-radius:6px;
  }
  .msg.user .bubble{
    background:#3B82F6;
    color:#fff;
    border-bottom-right-radius:6px;
    box-shadow:0 2px 8px rgba(59,130,246,0.25);
  }

  /* ── MARKDOWN RENDERING (tutor bubbles only) ── */
  .tutor-bubble { white-space: normal; }
  .tutor-bubble h1, .tutor-bubble h2 { font-size: 15px; font-weight: 700; margin: 10px 0 4px; color: #1e3a5f; }
  .tutor-bubble h3 { font-size: 14px; font-weight: 600; margin: 8px 0 4px; }
  .tutor-bubble strong { font-weight: 700; color: #1e3a5f; }
  .tutor-bubble em { font-style: italic; color: #374151; }
  .tutor-bubble ul, .tutor-bubble ol { padding-left: 18px; margin: 6px 0; }
  .tutor-bubble li { margin-bottom: 4px; line-height: 1.6; }
  .tutor-bubble p { margin: 6px 0; line-height: 1.7; }
  .tutor-bubble p:first-child { margin-top: 0; }
  .tutor-bubble p:last-child { margin-bottom: 0; }
  .tutor-bubble code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* ── TYPING INDICATOR ── */
  .typing{
    display:flex;align-items:center;gap:5px;
    padding:14px 16px;
  }
  .typing span{
    width:7px;height:7px;border-radius:50%;
    background:#94A3B8;opacity:0.5;
    animation:dot 1.2s ease infinite;
  }
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes dot{
    0%,80%,100%{opacity:0.4;transform:scale(1);}
    40%{opacity:1;transform:scale(1.3);}
  }

  /* ── WELCOME EMPTY STATE ── */
  .welcome{
    text-align:center;
    padding:28px 18px 8px;
    color:#475569;
  }
  .welcome-emoji{font-size:54px;margin-bottom:14px;}
  .welcome-title{
    font-size:22px;font-weight:800;color:#1F2937;
    margin-bottom:8px;letter-spacing:-0.3px;
  }
  .welcome-sub{font-size:14px;line-height:1.7;max-width:380px;margin:0 auto 18px;}
  .quick-chips{
    display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
    max-width:420px;margin:0 auto;
  }
  .chip{
    background:#fff;border:1px solid #E5E7EB;
    border-radius:20px;padding:8px 14px;
    font-size:13px;font-weight:600;color:#3B82F6;
    cursor:pointer;transition:all .2s;
    font-family:inherit;text-align:left;
  }
  .chip:hover{background:#EFF6FF;border-color:#3B82F6;transform:translateY(-1px);}

  /* ── INPUT BAR ── */
  .input-bar{
    background:#fff;
    border-top:1px solid #E5E7EB;
    padding:10px 12px;
    flex-shrink:0;
    box-shadow:0 -2px 12px rgba(0,0,0,0.04);
    margin-bottom:74px; /* sit above bottom nav */
  }
  .input-bar-inner{
    max-width:760px;width:100%;margin:0 auto;
    display:flex;align-items:flex-end;gap:8px;
  }
  .text-input{
    flex:1;
    background:#F1F5F9;
    border:1.5px solid transparent;
    border-radius:22px;
    padding:11px 16px;
    font-family:inherit;font-size:14.5px;line-height:1.5;
    color:#1F2937;
    resize:none;
    max-height:130px;min-height:42px;
    outline:none;
    transition:border-color .2s,background .2s;
  }
  .text-input:focus{border-color:#3B82F6;background:#fff;}
  .text-input::placeholder{color:#94A3B8;}

  .icon-btn{
    width:42px;height:42px;border-radius:50%;
    border:none;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    transition:all .2s;
  }
  .mic-btn{background:#F1F5F9;color:#475569;}
  .mic-btn:hover{background:#E2E8F0;}
  .mic-btn.recording{
    background:#EF4444;color:#fff;
    animation:pulse 1.3s ease infinite;
  }
  .mic-btn.disabled{opacity:0.4;cursor:not-allowed;}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5);}
    50%{box-shadow:0 0 0 10px rgba(239,68,68,0);}
  }
  .send-btn{
    background:#3B82F6;color:#fff;
    box-shadow:0 2px 8px rgba(59,130,246,0.3);
  }
  .send-btn:hover{background:#2563EB;transform:translateY(-1px);}
  .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}

  /* ── BOTTOM NAV ── */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;
    background:#fff;
    border-top:1px solid #E5E7EB;
    display:flex;justify-content:space-around;padding:10px 0 18px;z-index:100;
    box-shadow:0 -4px 20px rgba(0,0,0,0.06);
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    cursor:pointer;padding:6px 10px;border-radius:10px;
    transition:all .2s;border:none;background:none;color:#9CA3AF;
    text-decoration:none;flex:1;max-width:88px;
  }
  .nav-item:hover,.nav-item.active{color:#3B82F6;}
  .nav-icon{font-size:20px;line-height:1;}
  .nav-label{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}

  @media (max-width:380px){
    .nav-item{padding:6px 4px;}
    .nav-label{font-size:9px;letter-spacing:0.3px;}
    .level-pill{padding:6px 12px;font-size:12px;}
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="tutor-header">
  <a href="/dashboard" class="tutor-back" aria-label="Back to dashboard">←</a>
  <div class="tutor-avatar-h">👩‍🏫</div>
  <div class="tutor-title-wrap">
    <div class="tutor-title">AI Tutor</div>
    <div class="tutor-status"><span class="tutor-dot"></span> Ask me anything about German</div>
  </div>
</header>

<!-- LEVEL PILLS -->
<div class="level-bar" role="tablist" aria-label="Choose your level">
  <button class="level-pill" data-level="A1" role="tab">A1</button>
  <button class="level-pill" data-level="A2" role="tab">A2</button>
  <button class="level-pill" data-level="B1" role="tab">B1</button>
  <button class="level-pill" data-level="B2" role="tab">B2</button>
</div>

<!-- CHAT -->
<main class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-emoji">👩‍🏫</div>
    <div class="welcome-title">Hallo! I'm your AI Tutor</div>
    <div class="welcome-sub">Ask grammar questions, get sentences corrected, request writing feedback, or do speaking roleplay. Pick your level above to get started.</div>
    <div class="quick-chips">
      <button class="chip" data-q="Explain the Akkusativ case to me with examples.">Explain the Akkusativ case</button>
      <button class="chip" data-q="Correct this sentence: Ich gehe zu Schule jeden Tag.">Correct: "Ich gehe zu Schule jeden Tag"</button>
      <button class="chip" data-q="Roleplay: you are a shopkeeper in Berlin. I want to buy bread. Start in German.">Roleplay: shopkeeper</button>
      <button class="chip" data-q="What is the difference between weil and denn?">weil vs denn?</button>
    </div>
  </div>
</main>

<!-- INPUT BAR -->
<div class="input-bar">
  <div class="input-bar-inner">
    <button class="icon-btn mic-btn" id="micBtn" aria-label="Record voice" title="Tap to speak">🎤</button>
    <textarea class="text-input" id="input" placeholder="Ask anything — grammar, sentences, roleplay…" rows="1"></textarea>
    <button class="icon-btn send-btn" id="sendBtn" aria-label="Send" title="Send">➤</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="/dashboard">
    <span class="nav-icon">📚</span>
    <span class="nav-label">Modules</span>
  </a>
  <a class="nav-item active" href="ai-tutor.html">
    <span class="nav-icon">👩‍🏫</span>
    <span class="nav-label">AI Tutor</span>
  </a>
  <a class="nav-item" href="ai-pal.html">
    <span class="nav-icon">🤗</span>
    <span class="nav-label">AI Pal</span>
  </a>
  <a class="nav-item" href="sprechen-prep.html">
    <span class="nav-icon">🎤</span>
    <span class="nav-label">Sprechen</span>
  </a>
  <a class="nav-item" href="exam-vault.html">
    <span class="nav-icon">📝</span>
    <span class="nav-label">Exam Vault</span>
  </a>
</nav>

<script>
(function(){
  'use strict';

  var API_BASE = 'https://deutschweg.onrender.com';
  var LEVELS   = ['A1','A2','B1','B2'];
  var LS_KEY   = 'dw_ai_tutor_level';

  var chat    = document.getElementById('chat');
  var welcome = document.getElementById('welcome');
  var input   = document.getElementById('input');
  var sendBtn = document.getElementById('sendBtn');
  var micBtn  = document.getElementById('micBtn');
  var pills   = document.querySelectorAll('.level-pill');

  // ── Level state (persisted in localStorage) ─────────────────────────────
  var level = 'A1';
  try {
    var saved = localStorage.getItem(LS_KEY);
    if (saved && LEVELS.indexOf(saved) !== -1) level = saved;
  } catch(_) {}

  function setLevel(newLevel){
    if (LEVELS.indexOf(newLevel) === -1) return;
    level = newLevel;
    try { localStorage.setItem(LS_KEY, level); } catch(_) {}
    pills.forEach(function(p){
      p.classList.toggle('active', p.getAttribute('data-level') === level);
    });
  }
  pills.forEach(function(p){
    p.addEventListener('click', function(){ setLevel(p.getAttribute('data-level')); });
  });
  setLevel(level);

  // ── Conversation history (full session, server caps to last 30) ─────────
  var history = [];

  // ── Wake the Render server ──────────────────────────────────────────────
  fetch(API_BASE + '/').catch(function(){});

  // ── Auto-resize textarea ────────────────────────────────────────────────
  input.addEventListener('input', function(){
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 130) + 'px';
  });

  // ── Send on Enter (Shift+Enter = newline) ───────────────────────────────
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Quick-start chips ───────────────────────────────────────────────────
  document.querySelectorAll('.chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      input.value = chip.getAttribute('data-q');
      input.dispatchEvent(new Event('input'));
      sendMessage();
    });
  });

  // ── Append message bubble ───────────────────────────────────────────────
  function appendMessage(role, text){
    if (welcome && welcome.parentNode) {
      welcome.parentNode.removeChild(welcome);
      welcome = null;
    }
    var row = document.createElement('div');
    row.className = 'msg ' + role;
    var bubbleClass = role === 'tutor' ? 'bubble tutor-bubble' : 'bubble';
    var html = '';
    if (role === 'tutor') html += '<div class="msg-av">👩‍🏫</div>';
    html += '<div class="' + bubbleClass + '"></div>';
    row.innerHTML = html;
    var bubbleEl = row.querySelector('.bubble');
    if (role === 'tutor' && typeof marked !== 'undefined') {
      bubbleEl.innerHTML = marked.parse(text);
    } else {
      bubbleEl.textContent = text;
    }
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return row;
  }

  function showTyping(){
    var row = document.createElement('div');
    row.className = 'msg tutor';
    row.id = 'typing-row';
    row.innerHTML = '<div class="msg-av">👩‍🏫</div><div class="bubble typing"><span></span><span></span><span></span></div>';
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping(){
    var el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  // ── Send message ────────────────────────────────────────────────────────
  function sendMessage(){
    var text = input.value.trim();
    if (!text || sendBtn.disabled) return;

    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    history.push({ role: 'user', content: text });
    showTyping();

    fetch(API_BASE + '/api/aitutor', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ messages: history, level: level })
    })
    .then(function(r){ return r.json().then(function(j){ return { ok: r.ok, body: j }; }); })
    .then(function(res){
      hideTyping();
      if (res.ok && res.body && res.body.reply){
        appendMessage('tutor', res.body.reply);
        history.push({ role: 'assistant', content: res.body.reply });
      } else {
        var msg = (res.body && res.body.error) ? res.body.error : 'Oops — something went wrong. Try again!';
        appendMessage('tutor', msg);
      }
    })
    .catch(function(){
      hideTyping();
      appendMessage('tutor', 'I\'m having trouble connecting right now. Check your internet and try again.');
    })
    .finally(function(){
      sendBtn.disabled = false;
      input.focus();
    });
  }

  // ── Voice input via Web Speech API ──────────────────────────────────────
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR){
    micBtn.classList.add('disabled');
    micBtn.title = 'Voice input not supported on this browser';
    micBtn.addEventListener('click', function(){
      alert('Voice input is not supported on this browser. Try Chrome on Android or desktop.');
    });
  } else {
    var recognition = new SR();
    recognition.lang = 'de-DE';
    recognition.continuous = false;
    recognition.interimResults = true;

    var isRecording = false;
    var finalTranscript = '';

    recognition.addEventListener('start', function(){
      isRecording = true;
      finalTranscript = '';
      micBtn.classList.add('recording');
      micBtn.textContent = '⏺';
    });

    recognition.addEventListener('result', function(e){
      var interim = '';
      for (var i = e.resultIndex; i < e.results.length; i++){
        var t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTranscript += t;
        else interim += t;
      }
      input.value = (finalTranscript + interim).trim();
      input.dispatchEvent(new Event('input'));
    });

    recognition.addEventListener('end', function(){
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      if (input.value.trim()) sendMessage();
    });

    recognition.addEventListener('error', function(e){
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        alert('Microphone access was blocked. Allow microphone in your browser settings to use voice input.');
      } else if (e.error !== 'no-speech' && e.error !== 'aborted'){
        console.warn('Speech recognition error:', e.error);
      }
    });

    micBtn.addEventListener('click', function(){
      if (isRecording){
        try { recognition.stop(); } catch(_){}
      } else {
        try { recognition.start(); } catch(_){}
      }
    });
  }
})();
</script>

</body>
</html>
