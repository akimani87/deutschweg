<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeutschWeg — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#0a0a0a; --white:#f5f0e8; --cream:#ede8dc;
    --gold:#c9a84c; --gold-light:#e8c96a;
    --red:#c0392b; --green:#27ae60; --blue:#3498db;
    --gray:#6b6b6b; --card-bg:#141414; --card2-bg:#1a1a1a;
    --border:rgba(201,168,76,0.2);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity 0.25s ease;}
  body.ready{opacity:1;}
  .top-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid rgba(201,168,76,0.1);background:rgba(10,10,10,0.97);flex-shrink:0;}
  .logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:900;text-decoration:none;color:var(--white);}
  .logo span{color:var(--gold);}
  .nav-link{font-size:13px;color:var(--gray);text-decoration:none;transition:color 0.2s;}
  .nav-link:hover{color:var(--cream);}
  .nav-link em{color:var(--gold);font-style:normal;}
  .page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 60px;}
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:400px;height:300px;background:radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);pointer-events:none;}
  .card-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:14px;}
  .card-h{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;line-height:1.15;margin-bottom:8px;}
  .card-sub{font-size:14px;color:var(--gray);line-height:1.75;margin-bottom:32px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cream);margin-bottom:7px;}
  .field input{width:100%;background:var(--card2-bg);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--white);transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
  .field input::placeholder{color:var(--gray);}
  .field input:focus{border-color:rgba(201,168,76,0.5);box-shadow:0 0 0 3px rgba(201,168,76,0.08);}
  .field input.error{border-color:rgba(192,57,43,0.6);box-shadow:0 0 0 3px rgba(192,57,43,0.08);}
  .field-err{font-size:12px;color:#e74c3c;margin-top:6px;display:none;}
  .field-err.show{display:block;}
  .pw-wrap{position:relative;}
  .pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray);font-size:14px;padding:4px;transition:color 0.2s;}
  .pw-toggle:hover{color:var(--cream);}
  .forgot{text-align:right;margin-top:6px;}
  .forgot a{font-size:12px;color:var(--gray);text-decoration:none;transition:color 0.2s;}
  .forgot a:hover{color:var(--gold);}
  .btn-submit{width:100%;padding:16px;border-radius:50px;background:var(--gold);color:var(--black);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all 0.25s;box-shadow:0 6px 20px rgba(201,168,76,0.25);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .btn-submit:hover{background:var(--gold-light);transform:translateY(-2px);}
  .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
  .spinner{width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(0,0,0,0.2);border-top-color:rgba(0,0,0,0.7);animation:spin 0.7s linear infinite;display:none;}
  .spinner.show{display:block;}
  .divider{display:flex;align-items:center;gap:12px;margin:24px 0 20px;}
  .divider-line{flex:1;height:1px;background:rgba(255,255,255,0.07);}
  .divider-txt{font-size:12px;color:var(--gray);}
  .signup-link{text-align:center;font-size:14px;color:var(--gray);}
  .signup-link a{color:var(--gold);text-decoration:none;font-weight:600;}
  .signup-link a:hover{text-decoration:underline;}
  .error-banner{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#e74c3c;margin-bottom:18px;display:none;}
  .error-banner.show{display:block;}
  .page-footer{text-align:center;padding:20px 24px;font-size:12px;color:var(--gray);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0;}
  .page-footer a{color:var(--gray);text-decoration:none;}
  .page-footer a:hover{color:var(--cream);}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:520px){.card{padding:32px 24px;border-radius:20px;}.card-h{font-size:24px;}}
</style>
</head>
<body>

<div class="top-nav">
  <a href="index.html" class="logo">Deutsch<span>Weg</span></a>
  <a href="signup.html" class="nav-link">No account yet? <em>Sign up free</em></a>
</div>

<div class="page">
  <div class="card">
    <div class="card-eyebrow">WELCOME BACK</div>
    <h1 class="card-h">Log in to DeutschWeg</h1>
    <p class="card-sub">Continue your German exam preparation.</p>

    <div class="error-banner" id="errorBanner"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="kwame@example.com" autocomplete="email">
        <div class="field-err" id="emailErr">Please enter a valid email.</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pwToggle">👁</button>
        </div>
        <div class="field-err" id="passwordErr">Please enter your password.</div>
        <div class="forgot"><a href="#" id="forgotLink">Forgot password?</a></div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnText">Log in →</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-txt">or</div>
      <div class="divider-line"></div>
    </div>

    <div class="signup-link">
      Don't have an account? <a href="signup.html">Start your 14-day free trial</a>
    </div>

  </div>
</div>

<div class="page-footer">
  <a href="index.html">DeutschWeg</a> &nbsp;·&nbsp;
  <a href="mailto:hello@deutschweg.com">Contact</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.body.classList.add('ready');

  // If already logged in, redirect
  dwSupabase.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      window.location.href = 'deutschweg-prototype.html';
    }
  });

  var emailI   = document.getElementById('email');
  var passI    = document.getElementById('password');
  var submitBtn= document.getElementById('submitBtn');
  var btnText  = document.getElementById('btnText');
  var spinner  = document.getElementById('spinner');
  var pwToggle = document.getElementById('pwToggle');
  var errorBanner = document.getElementById('errorBanner');

  pwToggle.addEventListener('click', function() {
    var isText = passI.type === 'text';
    passI.type = isText ? 'password' : 'text';
    pwToggle.textContent = isText ? '👁' : '🙈';
  });

  function showBanner(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('show');
  }
  function hideBanner() { errorBanner.classList.remove('show'); }

  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.style.display = on ? 'none' : '';
    spinner.classList.toggle('show', on);
  }

  // Forgot password
  document.getElementById('forgotLink').addEventListener('click', function(e) {
    e.preventDefault();
    var email = emailI.value.trim();
    if (!email) { emailI.focus(); showBanner('Enter your email above, then click Forgot password.'); return; }
    hideBanner();
    dwSupabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    }).then(function(res) {
      if (res.error) { showBanner(res.error.message); }
      else { showBanner('Password reset email sent! Check your inbox.'); errorBanner.style.color = 'var(--green)'; }
    });
  });

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    hideBanner();

    var email = emailI.value.trim();
    var pass  = passI.value;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('emailErr').classList.add('show');
      emailI.classList.add('error');
      return;
    }
    if (!pass) {
      document.getElementById('passwordErr').classList.add('show');
      passI.classList.add('error');
      return;
    }

    setLoading(true);

    dwSupabase.auth.signInWithPassword({ email: email, password: pass })
      .then(function(res) {
        if (res.error) {
          setLoading(false);
          var msg = res.error.message || 'Login failed.';
          if (msg.toLowerCase().includes('invalid') || msg.toLowerCase().includes('credentials')) {
            msg = 'Incorrect email or password. Please try again.';
          }
          showBanner(msg);
          return;
        }
        // Successful login — check trial
        var meta = res.data.user.user_metadata || {};
        localStorage.setItem('dw_user_name', (meta.full_name || '').split(' ')[0] || 'Student');
        window.location.href = 'deutschweg-prototype.html';
      })
      .catch(function() {
        setLoading(false);
        showBanner('Something went wrong. Please try again.');
      });
  });
});
</script>
</body>
</html>
