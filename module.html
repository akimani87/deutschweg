      .catch(function() { window.DWPal.stopTyping(); });
  }

  function runPalOpener() {
    if (!window.DWPal || !state.user) return;
    if (!state.lessons || state.lessons.length === 0) return;
    var lesson = state.lessons[state.lessonIdx] || state.lessons[0];
    if (!lesson) return;

    gatherPalContext(lesson).then(function(ctx) {
      // Behavior 1 — brand-new user, shown exactly once.
      var welcomeKey = 'dw_pal_welcomed_' + state.user.id;
      if (ctx.completed_lessons === 0 && !palLS(welcomeKey)) {
        palLS(welcomeKey, '1');
        fetchPalOpener('welcome', ctx, true);
        return;
      }

      // Behavior 2 — emotional check-in every 3rd lesson (once per lesson/session).
      var num = lesson.order_index || 0;
      var checkKey = 'dw_pal_checkin_' + lesson.id;
      if (num > 0 && num % 3 === 0 && !palSession(checkKey)) {
        palSession(checkKey, '1');
        window.DWPal.open();
        window.DWPal.checkin({
          question: 'Before we start — how are you feeling today, ' + (ctx.first_name || 'friend') + '?',
          options: [
            { value: 'nervous',       label: '😰 Nervous' },
            { value: 'getting_there', label: '🙂 Getting there' },
            { value: 'tired',         label: '😴 Tired' },
            { value: 'ready',         label: '💪 Ready' }
          ],
          onPick: function(mood) {
            dwSupabase.from('pal_checkins')
              .insert({ user_id: state.user.id, lesson_id: lesson.id, mood: mood })
              .then(function() {}).catch(function() {});
            ctx.emotional_checkin = mood;
            fetchPalOpener('companion', ctx, true);
          }
        });
        return;
      }

      // Behavior 2 — regular opener: preload the message, flag the bubble
      // with an unread badge rather than hijacking the screen.
      fetchPalOpener('companion', ctx, false);
    }).catch(function(e) {
      console.warn('[pal] opener skipped:', e && e.message);
    });
  }

  // First name, fetched once and cached (used by struggle + milestone).
  var _palFirstName = null;
  function getPalFirstName() {
    if (_palFirstName !== null) return Promise.resolve(_palFirstName);
    if (!state.user) return Promise.resolve('');
    return dwSupabase.from('profiles').select('full_name').eq('id', state.user.id).maybeSingle()
      .then(function(res) {
        var n = (res && res.data && res.data.full_name) || '';
        _palFirstName = String(n).trim().split(/\s+/)[0] || '';
        return _palFirstName;
      })
      .catch(function() { return ''; });
  }

  // ── Behavior 4: struggle support ─────────────────────────────────────────
  // Fired on 2 wrong-in-a-row. Once per lesson, gentle slide-in via the widget.
  function maybeShowStruggle(lesson) {
    if (!window.DWPal || !state.user || !lesson) return;
    if (state.struggleShownLesson[lesson.id]) return;
    state.struggleShownLesson[lesson.id] = true;
    state.consecutiveWrong = 0;
    getPalFirstName().then(function(fn) {
      var ctx = { first_name: fn, exercise_topic: lesson.title || 'this exercise' };
      window.DWPal.open();
      window.DWPal.typing();
      fetch(window.DWPal.apiBase + '/api/aipal/struggle', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ context: ctx })
      })
        .then(function(r) { return r.json(); })
        .then(function(j) {
          window.DWPal.stopTyping();
          if (j && j.message) {
            window.DWPal.speak(j.message, true);
            // Hand the struggle context to AI Tutor so the learner can cross
            // over without repeating themselves.
            writePalTutorHandoff(lesson, j.message);
          }
        })
        .catch(function() { window.DWPal.stopTyping(); });
    });
  }

  // Persist a quiz-struggle handoff for AI Tutor. weak_word is the correct
  // answer (or rule hint) of the exercise the learner just missed.
  // lessonContext (optional) is the "Go Deeper" rule-block text -- present
  // when the handoff comes from the lesson-end prompt rather than a quiz
  // struggle.
  function writePalTutorHandoff(lesson, lastMessage, lessonContext) {
    if (!state.user) return Promise.resolve();
    var ex   = state.lastWrongExercise;
    var weak = (ex && (ex.correct_answer || ex.rule_hint)) || null;
    return dwSupabase.from('pal_tutor_handoff').insert({
      user_id:          state.user.id,
      topic:            (lesson && lesson.title) || null,
      weak_word:        weak,
      last_pal_message: lastMessage || null,
      lesson_context:   lessonContext || null
    }).then(function() {}).catch(function() {});
  }

  // ── "Go Deeper" lesson-end prompt ────────────────────────────────────────
  // Context is pulled automatically from the lesson's own data -- no
  // per-lesson manual authoring required, so this works across every A1
  // module without extra editorial work:
  //   topic     = lesson.title (always present)
  //   ruleText  = first rule-card's title+description, else the first
  //               plain text block, else null (topic-only fallback)
  function extractLessonContext(lesson) {
    var topic = (lesson && lesson.title) || 'this lesson';
    var ruleText = null;
    var cj = (lesson && Array.isArray(lesson.content_json)) ? lesson.content_json : [];
    var ruleCard = cj.filter(function(b){ return b && b.type === 'rule-card'; })[0];
    if (ruleCard) {
      ruleText = [ruleCard.title, ruleCard.description].filter(Boolean).join(' — ');
    } else {
      var textBlock = cj.filter(function(b){ return b && b.type === 'text' && b.content; })[0];
      if (textBlock) ruleText = textBlock.content;
    }
    return { topic: topic, ruleText: ruleText || '' };
  }

  function goDeeperPal(idx) {
    var lesson = state.lessons[idx];
    if (!lesson) return;
    var ctx = extractLessonContext(lesson);
    if (window.DWPal) window.DWPal.seedLesson(ctx.topic, ctx.ruleText);
  }

  function goDeeperTutor(idx) {
    var lesson = state.lessons[idx];
    if (!lesson) return;
    var ctx = extractLessonContext(lesson);
    // No prior Pal message on this path -- writePalTutorHandoff's
    // last_pal_message stays null, and server.js frames the Tutor's
    // opener accordingly (see buildAitutorHandoffBlock).
    writePalTutorHandoff(lesson, null, ctx.ruleText).then(function(){
      window.location.href = 'ai-tutor.html';
    }, function(){
      window.location.href = 'ai-tutor.html';
    });
  }

  // Site-wide, one-time dismissible tooltip: shown the first time ANY
  // learner reaches ANY lesson-end "Go Deeper" prompt. Flag lives on
  // profiles so it never reappears after dismissal, on any device.
  var goDeeperTooltipChecked = false;
  function maybeShowGoDeeperTooltip(idx) {
    if (goDeeperTooltipChecked || !state.user) return;
    goDeeperTooltipChecked = true;
    dwSupabase.from('profiles').select('go_deeper_tooltip_seen').eq('id', state.user.id).maybeSingle()
      .then(function(res) {
        if (res.error || !res.data || res.data.go_deeper_tooltip_seen) return;
        var wrap = document.getElementById('go-deeper-' + idx);
        if (!wrap) return;
        var tip = document.createElement('div');
        tip.className = 'gd-tooltip';
        tip.innerHTML = '<span>💬</span>' +
          '<span>This connects you with AI help, right here — no need to search elsewhere.</span>' +
          '<span class="gd-tt-x">✕</span>';
        wrap.parentNode.insertBefore(tip, wrap);
        function dismiss() {
          if (tip.parentNode) tip.parentNode.removeChild(tip);
          dwSupabase.from('profiles').update({ go_deeper_tooltip_seen: true }).eq('id', state.user.id)
            .then(function(){}).catch(function(){});
        }
        tip.querySelector('.gd-tt-x').addEventListener('click', dismiss);
      })
      .catch(function() {});
  }

  // ── Behavior 6: confidence tracker store ─────────────────────────────────
  function savePalConfidence(lessonId, level) {
    if (!state.user) return;
    dwSupabase.from('lesson_confidence')
      .insert({ user_id: state.user.id, lesson_id: lessonId, confidence_level: level })
      .then(function() {}).catch(function() {});
  }

  // ── Dictionary word-bank confidence ──────────────────────────────────────
  // Load the learner's saved words (keyed by lowercased German word) so we can
  // recognise them in quiz answers and raise confidence weak→medium→strong.
  function loadUserWordBank() {
    if (!state.user) return;
    dwSupabase.from('user_word_bank')
      .select('word_id, correct_count, confidence_level, dictionary:word_id ( word )')
      .eq('user_id', state.user.id)
      .then(function(r) {
        state.wordBank = {};
        ((r && r.data) || []).forEach(function(row) {
          var w = row.dictionary && row.dictionary.word;
          if (w) state.wordBank[String(w).toLowerCase()] = {
            word_id: row.word_id,
            correct_count: row.correct_count || 0,
            confidence_level: row.confidence_level || 'weak'
          };
        });
      }).catch(function() {});
  }

  // When a saved word is answered correctly in a quiz, bump its correct_count
  // and promote confidence at 3 (medium) and 5 (strong).
  function maybeBumpWordConfidence(ex) {
    if (!state.user || !ex || !state.wordBank) return;
    var answer = String(ex.correct_answer || '');
    if (!answer) return;
    var bare = answer.toLowerCase().replace(/^(der|die|das)\s+/, '').trim();
    var entry = state.wordBank[bare];
    if (!entry) {
      // Otherwise match any saved word that appears as a whole word in the answer.
      var keys = Object.keys(state.wordBank);
      for (var i = 0; i < keys.length && !entry; i++) {
        var safe = keys[i].replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (new RegExp('\\b' + safe + '\\b', 'i').test(answer)) entry = state.wordBank[keys[i]];
      }
    }
    if (!entry) return;
    entry.correct_count = (entry.correct_count || 0) + 1;
    var newConf = entry.correct_count >= 5 ? 'strong' : (entry.correct_count >= 3 ? 'medium' : entry.confidence_level);
    var patch = { correct_count: entry.correct_count };
    if (newConf !== entry.confidence_level) { patch.confidence_level = newConf; entry.confidence_level = newConf; }
    dwSupabase.from('user_word_bank').update(patch)
      .eq('user_id', state.user.id).eq('word_id', entry.word_id)
      .then(function() {}).catch(function() {});
  }

  // ── Behavior 3: lesson-complete popup content ────────────────────────────
  function fetchCompleteContent(lesson) {
    var ctx = {
      lesson_title:       lesson.title || '',
      lesson_number:      lesson.order_index || 0,
      vocabulary_covered: extractKnownVocab([lesson])
    };
    return fetch(window.DWPal.apiBase + '/api/aipal/lesson-complete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ context: ctx })
    })
      .then(function(r) { return r.json(); })
      .then(function(j) { return (j && j.learned) ? j : null; })
      .catch(function() { return null; });
  }

  // ── Behavior 5: milestone detection ──────────────────────────────────────
  // Priority: A1 complete > 7-day streak > lesson 5 > first lesson. Each fires
  // at most once (session-guarded; counts/streaks naturally cross the
  // threshold only once anyway).
  function checkA1Complete(uid) {
    if (!state.module || state.module.level !== 'A1') return Promise.resolve(false);
    return dwSupabase.from('modules').select('id').eq('level', 'A1').eq('is_published', true)
      .then(function(mr) {
        var modIds = ((mr && mr.data) || []).map(function(m) { return m.id; });
        if (!modIds.length) return false;
        return dwSupabase.from('lessons').select('id').in('module_id', modIds).then(function(lr) {
          var allIds = ((lr && lr.data) || []).map(function(l) { return l.id; });
          if (!allIds.length) return false;
          return dwSupabase.from('user_progress')
            .select('lesson_id').eq('user_id', uid).eq('status', 'completed').in('lesson_id', allIds)
            .then(function(pr) {
              var done = {};
              ((pr && pr.data) || []).forEach(function(r) { if (r.lesson_id) done[r.lesson_id] = true; });
              return allIds.every(function(id) { return done[id]; });
            });
        });
      })
      .catch(function() { return false; });
  }

  function detectMilestone(lesson) {
    var uid = state.user.id;
    function once(m) {
      var k = 'dw_pal_ms_' + uid + '_' + m;
      if (palSession(k)) return false;
      palSession(k, '1');
      return true;
    }
    return Promise.all([
      dwSupabase.from('user_progress').select('id', { count: 'exact', head: true })
        .eq('user_id', uid).eq('status', 'completed').not('lesson_id', 'is', null),
      dwSupabase.from('profiles').select('streak_count').eq('id', uid).maybeSingle(),
      checkA1Complete(uid)
    ]).then(function(rs) {
      var count  = (rs[0] && rs[0].count) || 0;
      var streak = (rs[1] && rs[1].data && rs[1].data.streak_count) || 0;
      var a1done = rs[2];
      if (a1done && once('a1_complete'))       return 'a1_complete';
      if (streak === 7 && once('seven_day_streak')) return 'seven_day_streak';
      if (count === 5 && once('lesson_5'))     return 'lesson_5';
      if (count === 1 && once('first_lesson')) return 'first_lesson';
      return null;
    }).catch(function() { return null; });
  }

  function fetchMilestoneMessage(milestone) {
    return getPalFirstName().then(function(fn) {
      return fetch(window.DWPal.apiBase + '/api/aipal/milestone', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ context: { first_name: fn, milestone: milestone } })
      })
        .then(function(r) { return r.json(); })
        .then(function(j) { return (j && j.message) || null; })
        .catch(function() { return null; });
    });
  }

  // Orchestrates Behaviors 3 + 5 + 6 once a lesson is completed. A milestone
  // celebration (if any) plays first, then the lesson-complete popup carrying
  // the confidence tracker.
  function onPalLessonFinished(lesson) {
    if (!window.DWPal || !state.user || !lesson) return;
    Promise.all([detectMilestone(lesson), fetchCompleteContent(lesson)]).then(function(rs) {
      var milestone = rs[0];
      var content   = rs[1];
      function showComplete() {
        if (!content) return;
        window.DWPal.completePopup({
          learned:       content.learned,
          matters:       content.matters,
          encouragement: content.encouragement,
          onConfidence:  function(level) { savePalConfidence(lesson.id, level); }
        });
      }
      if (milestone) {
        fetchMilestoneMessage(milestone).then(function(msg) {
          if (msg) window.DWPal.milestone({ message: msg, onClose: showComplete });
          else showComplete();
        });
      } else {
        showComplete();
      }
    }).catch(function() {});
  }

  function renderQuiz(ex, lIdx, eIdx, total) {
    var opts = Array.isArray(ex.options) ? ex.options : [];
    var correctIdx = opts.findIndex(function(o) {
      return String(o) === String(ex.correct_answer);
    });

    var optsHtml = opts.map(function(o, i) {
      return (
        '<button type="button" class="qopt" id="opt-' + lIdx + '-' + eIdx + '-' + i + '" ' +
          'onclick="dwModule.answer(' + lIdx + ',' + eIdx + ',' + i + ',' + correctIdx + ')">' +
          '<span class="qletter">' + String.fromCharCode(65 + i) + '</span>' +
          '<span>' + escapeHtml(String(o)) + '</span>' +
        '</button>'
      );
    }).join('');

    var isLast = eIdx === total - 1;
    var nextLabel = isLast ? 'Continue →' : 'Next question →';

    // Success pill (last question only). Two rows live in the markup but the
    // outer .quiz-success is display:none until answer() reveals it. The
    // outcome row stays display:none unless lernziel_completion is filled —
    // so an empty completion field means the pill stays a single warm line.
    var successSlotHtml = isLast
      ? '<div class="quiz-success" id="qs-' + lIdx + '-' + eIdx + '">' +
          '<div class="quiz-success-row">' +
            '<div class="quiz-success-icon">✨</div>' +
            '<div class="quiz-success-text" id="qst-' + lIdx + '-' + eIdx + '"></div>' +
          '</div>' +
          '<div class="quiz-success-outcome" id="qsc-' + lIdx + '-' + eIdx + '">' +
            '<div class="quiz-success-outcome-icon">✓</div>' +
            '<div class="quiz-success-outcome-body">' +
              '<div class="quiz-success-outcome-label">You can now…</div>' +
              '<div class="quiz-success-outcome-text" id="qsct-' + lIdx + '-' + eIdx + '"></div>' +
            '</div>' +
          '</div>' +
        '</div>'
      : '';

    return (
      '<div class="card quiz-card">' +
        '<div class="quiz-qnum">QUESTION ' + (eIdx + 1) + ' OF ' + total + '</div>' +
        '<div class="quiz-q">' + escapeHtml(ex.question) + '</div>' +
        '<div class="quiz-opts">' + optsHtml + '</div>' +
        '<div class="qfeedback" id="fb-' + lIdx + '-' + eIdx + '">' +
          '<div class="qft"  id="ft-' + lIdx + '-' + eIdx + '"></div>' +
          '<div class="qfb"  id="fbb-' + lIdx + '-' + eIdx + '"></div>' +
          '<div class="qfr"  id="fr-' + lIdx + '-' + eIdx + '" style="display:none;"></div>' +
        '</div>' +
        successSlotHtml +
        '<button class="btn btn-primary qnext" id="next-' + lIdx + '-' + eIdx + '" ' +
          'onclick="dwModule.advance(' + lIdx + ',' + (eIdx + 1) + ')">' + nextLabel + '</button>' +
      '</div>'
    );
  }

  // Warm, achievement-oriented messages shown only after the last question
  // of a lesson is answered. Phrased around completion + progress toward
  // the learner's reason for studying — never time-based. Pick one at
  // random per render so consecutive lessons don't always read identically.
  var QUIZ_SUCCESS_MESSAGES = [
    "Nice work — you can now practise this in a real situation.",
    "Great job — this lesson moves you one step closer to your Germany goal.",
    "Well done — you've earned the next lesson.",
    "Solid finish — every lesson like this builds your exam confidence."
  ];
  function pickQuizSuccessMessage() {
    var i = Math.floor(Math.random() * QUIZ_SUCCESS_MESSAGES.length);
    return QUIZ_SUCCESS_MESSAGES[i];
  }

  // Scan root for interactive block containers and call their init functions.
  // Only initialises VISIBLE blocks (offsetParent !== null) — hidden blocks
  // inside dw-block divs are skipped and will be initialised by nextBlock()
  // when they become visible. This prevents audio autoplaying on lesson open.
  function initInteractiveBlocks(root) {
    var scope = root || document;
    scope.querySelectorAll('[data-init="dwTiles"][id]').forEach(function(el) {
      if (el.offsetParent !== null) dwTiles.init(el.id);
    });
    scope.querySelectorAll('[data-init="dwClock"][id]').forEach(function(el) {
      if (el.offsetParent !== null) dwClock.init(el.id);
    });
    scope.querySelectorAll('[data-init="dwListen"][id]').forEach(function(el) {
      if (el.offsetParent !== null) dwListen.init(el.id);
    });
  }

  // Reset a lesson's sequential block state to its initial view:
  // block 0 visible, all subsequent blocks hidden, advance button hidden.
  // Called whenever navigating TO a lesson (goToLesson / nextLesson)
  // so the learner always starts from block 0 regardless of prior progress.
  function resetLessonBlocks(lessonIdx) {
    var contentStep = document.getElementById('s-' + lessonIdx + '-content');
    if (!contentStep) return;
    var blocks = contentStep.querySelectorAll('.dw-block');
    blocks.forEach(function(bl, bi) {
      bl.style.display = bi === 0 ? '' : 'none';
    });
    var advBtn = document.getElementById('blk-adv-' + lessonIdx);
    if (advBtn) advBtn.style.display = 'none';
    // Re-init any interactive block that is now visible (block 0)
    if (blocks.length > 0) initInteractiveBlocks(blocks[0]);
  }

  // Reveal the next sequential content block within a lesson.
  // Called by "Continue →" buttons on non-interactive blocks and auto-called
  // by interactive blocks when all their rounds complete.
  function nextBlock(lessonIdx, blockIdx) {
    var curr = document.getElementById('blk-' + lessonIdx + '-' + blockIdx);
    if (curr) curr.style.display = 'none';
    var next = document.getElementById('blk-' + lessonIdx + '-' + (blockIdx + 1));
    if (next) {
      next.style.display = '';
      // Init any interactive block that just became visible
      initInteractiveBlocks(next);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      // All content blocks shown — reveal the lesson advance button
      // (which now also carries the "Go Deeper" prompt, see buildAllLessons)
      var advBtn = document.getElementById('blk-adv-' + lessonIdx);
      if (advBtn) {
        advBtn.style.display = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        maybeShowGoDeeperTooltip(lessonIdx);
      }
    }
  }

  function finalizeBoot() {
    document.getElementById('loadingScreen').classList.remove('active');
    document.getElementById('mainContent').style.display = 'block';
    document.body.classList.add('ready');
    updateProgress();
  }

  function updateProgress() {
    var totalLessons = state.lessons.length || 1;
    var pct = Math.round((state.lessonIdx / totalLessons) * 100);
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('xpDisp').textContent = '⚡ ' + state.xp + ' XP';

    state.lessons.forEach(function(lesson, i) {
      var d = document.getElementById('dot-' + i);
      if (!d) return;
      d.classList.remove('active', 'done', 'in-progress');
      var done       = !!state.completedIds[lesson.id];
      var inProgress = !!state.inProgressIds[lesson.id];
      // Priority: done > in-progress > active. The 'active' override on
      // .dot.active is just visual emphasis — it can sit alongside .done.
      if (done) d.classList.add('done');
      else if (inProgress) d.classList.add('in-progress');
      if (i === state.lessonIdx) d.classList.add('active');
    });
  }

  // ── Progress writes (auth-aware, non-blocking) ─────────────────────────
  // All three helpers no-op for anonymous users and on errors so the UI
  // never blocks on Supabase. completed > in_progress: writes never
  // downgrade a lesson that's already marked completed.
  //
  // IMPORTANT: optimistic state flags (state.completedIds /
  // state.inProgressIds) are only flipped AFTER the DB upsert returns
  // without error. If the write fails, local state stays as-is so the
  // UI can't lie about progress that didn't actually save.

  // Bump the learner's daily streak + last_activity when they complete a
  // lesson. Same calendar day → unchanged; yesterday → +1; older/none → reset
  // to 1. Read-then-write (UTC days); best-effort, never blocks the UI.
  function bumpPalStreak() {
    if (!state.user) return Promise.resolve();
    return dwSupabase.from('profiles')
      .select('streak_count, last_activity')
      .eq('id', state.user.id).maybeSingle()
      .then(function(res) {
        if (res.error || !res.data) return;
        var now   = new Date();
        var today = now.toISOString().slice(0, 10);
        var last  = res.data.last_activity ? String(res.data.last_activity).slice(0, 10) : null;
        if (last === today) return; // already counted today
        var yesterday = new Date(now.getTime() - 86400000).toISOString().slice(0, 10);
        var streak = (last === yesterday) ? (res.data.streak_count || 0) + 1 : 1;
        return dwSupabase.from('profiles')
          .update({ streak_count: streak, last_activity: now.toISOString() })
          .eq('id', state.user.id)
          .then(function() {});
      })
      .catch(function() {});
  }

  function markLessonInProgress(lesson) {
    if (!state.user) {
      console.log('[progress] in_progress skipped — anonymous (no user)');
      return;
    }
    if (!lesson || !lesson.id) {
      console.warn('[progress] in_progress skipped — missing lesson/id', lesson);
      return;
    }
    if (state.completedIds[lesson.id])  return; // don't downgrade
    if (state.inProgressIds[lesson.id]) return; // already in_progress

    var payload = {
      user_id:      state.user.id,
      module_id:    state.module.id,
      lesson_id:    lesson.id,
      status:       'in_progress',
      score:        null,
      completed_at: null
    };
    console.log('[progress] in_progress upsert →', payload);

    dwSupabase.from('user_progress').upsert(payload, { onConflict: 'user_id,lesson_id' }).select().then(function(res) {
      if (res.error) {
        console.error('[progress] in_progress write FAILED', {
          message: res.error.message,
          code:    res.error.code,
          details: res.error.details,
          hint:    res.error.hint,
          status:  res.status
        });
        return;
      }
      console.log('[progress] ✓ in_progress saved', res.data && res.data[0]);
      // Confirmed — flip local state and re-render dots
      state.inProgressIds[lesson.id] = true;
      updateProgress();
    });
  }

  // Compute and persist a quiz score for this lesson; award 10 XP for a
  // first-time completion. Triggers module-completion check at the end.
  function markLessonComplete(lesson) {
    if (!state.user) {
      console.log('[progress] complete skipped — anonymous (no user)');
      return;
    }
    if (!lesson || !lesson.id) {
      console.warn('[progress] complete skipped — missing lesson/id', lesson);
      return;
    }
    if (state.completedIds[lesson.id]) {
      console.log('[progress] complete skipped — already completed', lesson.id);
      return;
    }

    var exercises = state.exercises[lesson.id] || [];
    var correct   = state.correctByLesson[lesson.id] || 0;
    var score     = exercises.length > 0
      ? Math.round((correct / exercises.length) * 100)
      : null; // no quiz → null score (not 0%)

    var payload = {
      user_id:      state.user.id,
      module_id:    state.module.id,
      lesson_id:    lesson.id,
      status:       'completed',
      score:        score,
      completed_at: new Date().toISOString()
    };
    console.log('[progress] completed upsert →', payload);

    dwSupabase.from('user_progress').upsert(payload, { onConflict: 'user_id,lesson_id' }).select().then(function(res) {
      if (res.error) {
        console.error('[progress] completed write FAILED', {
          message: res.error.message,
          code:    res.error.code,
          details: res.error.details,
          hint:    res.error.hint,
          status:  res.status
        });
        return;
      }
      console.log('[progress] ✓ completed saved', res.data && res.data[0]);
      // Confirmed — flip local state, re-render, then award XP
      state.completedIds[lesson.id] = true;
      delete state.inProgressIds[lesson.id];
      updateProgress();
      // Keep streak fresh first (milestone detection reads it), then run the
      // AI Pal completion moment (Behaviors 3/5/6).
      bumpPalStreak().then(function() { onPalLessonFinished(lesson); });

      dwSupabase.rpc('increment_xp', { uid: state.user.id, amt: 10 }).then(function(r) {
        if (r.error) console.error('[progress] +10 XP FAILED', r.error);
        else         console.log('[progress] ✓ +10 XP, total=' + r.data);
        checkModuleCompletion();
      });
    });
  }

  function checkModuleCompletion() {
    if (state.moduleAwarded) {
      console.log('[progress] module-completion check skipped — already awarded this session');
      return;
    }
    var totalLessons = state.lessons.length;
    if (totalLessons === 0) return;
    var doneCount = 0;
    state.lessons.forEach(function(l){ if (state.completedIds[l.id]) doneCount++; });
    console.log('[progress] module-completion check: ' + doneCount + '/' + totalLessons);
    if (doneCount < totalLessons) return;

    // Module-completion rows have lesson_id = NULL. We can't upsert on
    // (user_id, module_id) because no non-partial unique constraint
    // exists on that pair (it would conflict with multi-lesson rows),
    // and PostgREST's onConflict parameter doesn't support partial-
    // index predicates. So: SELECT first, INSERT only if missing. The
    // existence check also doubles as cross-session safety in case
    // state.moduleAwarded wasn't restored on boot.
    dwSupabase.from('user_progress')
      .select('id')
      .eq('user_id',   state.user.id)
      .eq('module_id', state.module.id)
      .is('lesson_id', null)
      .eq('status',    'completed')
      .limit(1)
      .then(function(check) {
        if (check.error) {
          console.error('[progress] module-completion existence check FAILED', {
            message: check.error.message,
            code:    check.error.code,
            details: check.error.details,
            hint:    check.error.hint,
            status:  check.status
          });
          return;
        }
        if (check.data && check.data.length > 0) {
          console.log('[progress] module-completion row already exists — no double XP');
          state.moduleAwarded = true;
          return;
        }

        var payload = {
          user_id:      state.user.id,
          module_id:    state.module.id,
          lesson_id:    null,
          status:       'completed',
          score:        null,
          completed_at: new Date().toISOString()
        };
        console.log('[progress] module-completion insert →', payload);

        dwSupabase.from('user_progress').insert(payload).select().then(function(res) {
          if (res.error) {
            console.error('[progress] module-completion write FAILED', {
              message: res.error.message,
              code:    res.error.code,
              details: res.error.details,
              hint:    res.error.hint,
              status:  res.status
            });
            return;
          }
          console.log('[progress] ✓ module-completion saved', res.data && res.data[0]);
          state.moduleAwarded = true;
          dwSupabase.rpc('increment_xp', { uid: state.user.id, amt: 50 }).then(function(r) {
            if (r.error) console.error('[progress] +50 XP module bonus FAILED', r.error);
            else         console.log('[progress] 🎉 Module complete — +50 XP, total=' + r.data);
          });
          advanceLetzteModulSlug();
        });
      });
  }

  // After a module is completed, point profiles.letzte_modul_slug at the
  // *next* module in sequence so the dashboard's "Weiter lernen" card
  // advances. Walks: same level → next order_index; if none, first module
  // of the next CEFR level. Failures degrade silently — the dashboard's
  // fallback (first A1) keeps the card sensible either way.
  function advanceLetzteModulSlug() {
    if (!state.user || !state.module) return;
    var cur = state.module;

    dwSupabase.from('modules')
      .select('id, level, order_index')
      .eq('level', cur.level)
      .eq('is_published', true)
      .gt('order_index', cur.order_index)
      .order('order_index', { ascending: true })
      .limit(1)
      .maybeSingle()
      .then(function(res) {
        if (res && res.data) {
          writeLetzteModulSlug(res.data.id);
          return;
        }
        // No next module in this level — try the first of the next level.
        var LEVELS = ['A1', 'A2', 'B1', 'B2'];
        var idx = LEVELS.indexOf(cur.level);
        if (idx === -1 || idx === LEVELS.length - 1) return; // top of the ladder
        var nextLevel = LEVELS[idx + 1];

        dwSupabase.from('modules')
          .select('id')
          .eq('level', nextLevel)
          .eq('is_published', true)
          .order('order_index', { ascending: true })
          .limit(1)
          .maybeSingle()
          .then(function(r2) {
            if (r2 && r2.data) writeLetzteModulSlug(r2.data.id);
          })
          .catch(function(){});
      })
      .catch(function(){});
  }

  function writeLetzteModulSlug(nextId) {
    dwSupabase.from('profiles')
      .update({ letzte_modul_slug: nextId })
      .eq('id', state.user.id)
      .then(function(r) {
        if (r.error) console.warn('[progress] letzte_modul_slug update failed:', r.error.message);
        else         console.log('[progress] ➡ letzte_modul_slug → ' + nextId);
      })
      .catch(function(){});
  }

  // ── Tap-to-translate: Dictionary mini popup ──────────────────────────────
  // Tapping a .dw-word in lesson content opens a small popup with the word,
  // article, English, and one example — plus "Full entry →" (dictionary page)
  // and "Save" (straight to the word bank, without leaving the lesson).
  var DW_API = 'https://deutschweg.onrender.com';
  var dwPop = null, dwPopWord = null, dwPopEntry = null;

  function ensureDwPop() {
    if (dwPop) return dwPop;
    dwPop = document.createElement('div');
    dwPop.className = 'dw-pop';
    dwPop.innerHTML =
      '<div class="dw-pop-arrow"></div>' +
      '<div class="dw-pop-body">' +
        '<div class="dw-pop-word" id="dwp-word"></div>' +
        '<div class="dw-pop-en" id="dwp-en"></div>' +
        '<div class="dw-pop-bsp" id="dwp-bsp"></div>' +
        '<div class="dw-pop-actions">' +
          '<button type="button" class="dw-pop-btn dw-pop-full" id="dwp-full">Full entry →</button>' +
          '<button type="button" class="dw-pop-btn dw-pop-save" id="dwp-save">❤️ Save</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(dwPop);
    dwPop.querySelector('#dwp-full').addEventListener('click', function() {
      if (dwPopWord) window.location.href = 'dictionary.html?word=' + encodeURIComponent(dwPopWord);
    });
    dwPop.querySelector('#dwp-save').addEventListener('click', dwSaveCurrentWord);
    return dwPop;
  }

  function positionDwPop(target) {
    var r = target.getBoundingClientRect();
    dwPop.style.visibility = 'hidden';
    dwPop.classList.add('show');
    var pw = dwPop.offsetWidth, ph = dwPop.offsetHeight;
    var left = Math.min(Math.max(8, r.left + r.width / 2 - pw / 2), window.innerWidth - pw - 8);
    var top = r.top - ph - 10, below = false;
    if (top < 8) { top = r.bottom + 10; below = true; }
    dwPop.style.left = left + 'px';
    dwPop.style.top = top + 'px';
    dwPop.classList.toggle('below', below);
    var ax = (r.left + r.width / 2) - left;
    dwPop.querySelector('.dw-pop-arrow').style.left = Math.min(Math.max(14, ax), pw - 14) + 'px';
    dwPop.style.visibility = '';
  }

  function openDwWord(word, target) {
    ensureDwPop();
    dwPopWord = word; dwPopEntry = null;
    document.getElementById('dwp-word').textContent = word;
    document.getElementById('dwp-en').textContent = 'Looking up…';
    document.getElementById('dwp-bsp').textContent = '';
    var saveBtn = document.getElementById('dwp-save');
    saveBtn.disabled = true; saveBtn.textContent = '❤️ Save';
    dwPop.classList.add('show');
    positionDwPop(target);

    fetch(DW_API + '/api/dictionary/' + encodeURIComponent(word))
      .then(function(r) { return r.json(); })
      .then(function(e) {
        if (!e || !e.word) { document.getElementById('dwp-en').textContent = 'Not found.'; return; }
        dwPopEntry = e;
        document.getElementById('dwp-word').textContent = e.article ? (e.article + ' ' + e.word) : e.word;
        document.getElementById('dwp-en').textContent = e.english || '';
        var bsp = Array.isArray(e.beispielsaetze) && e.beispielsaetze[0];
        var bspEl = document.getElementById('dwp-bsp');
        if (bsp) {
          bspEl.innerHTML = '<span class="dwp-bsp-de"></span><span class="dwp-bsp-en"></span>';
          bspEl.querySelector('.dwp-bsp-de').textContent = bsp.german || '';
          bspEl.querySelector('.dwp-bsp-en').textContent = bsp.english || '';
        }
        if (state.user) saveBtn.disabled = false;
        positionDwPop(target);
      })
      .catch(function() { document.getElementById('dwp-en').textContent = 'Connection problem.'; });
  }

  function dwSaveCurrentWord() {
    var btn = document.getElementById('dwp-save');
    if (!dwPopEntry || !dwPopEntry.id) return;
    if (!state.user) { btn.textContent = 'Sign in to save'; return; }
    btn.disabled = true;
    dwSupabase.from('user_word_bank')
      .insert({ user_id: state.user.id, word_id: dwPopEntry.id, confidence_level: 'weak' })
      .then(function(r) {
        // 23505 = already saved (unique violation) → treat as success.
        if (!r.error || (r.error && r.error.code === '23505')) { btn.textContent = '✓ Saved'; }
        else { btn.textContent = 'Try again'; btn.disabled = false; }
      });
  }

  function closeDwPop() { if (dwPop) dwPop.classList.remove('show'); dwPopWord = null; dwPopEntry = null; }

  document.addEventListener('click', function(e) {
    var w = e.target.closest && e.target.closest('.dw-word');
    if (w) { e.preventDefault(); openDwWord(w.getAttribute('data-word') || w.textContent, w); return; }
    if (dwPop && dwPop.classList.contains('show') && !e.target.closest('.dw-pop')) closeDwPop();
  });
  window.addEventListener('scroll', closeDwPop, true);

  // ── Public handlers ─────────────────────────────────────────────────────
  window.dwModule = {
    // Expose nextBlock so inline onclick handlers in content blocks can reach it.
    nextBlock: function(lessonIdx, blockIdx) { nextBlock(lessonIdx, blockIdx); },

    // "Go Deeper" lesson-end prompt buttons.
    goDeeperPal:   function(idx) { goDeeperPal(idx); },
    goDeeperTutor: function(idx) { goDeeperTutor(idx); },

    answer: function(lIdx, eIdx, choiceIdx, correctIdx) {
      var key = lIdx + '-' + eIdx;
      var first = !state.answeredKeys[key];
      state.answeredKeys[key] = true;

      var ex = state.exercises[state.lessons[lIdx].id][eIdx];
      var isCorrect = (choiceIdx === correctIdx);

      // AI Pal struggle detection (Behavior 4). Quiz options lock after the
      // first answer, so "same exercise twice" can't happen literally — the
      // faithful signal is two wrong answers in a row. Only count genuine
      // first attempts (not review re-answers).
      if (first) {
        if (isCorrect) {
          state.consecutiveWrong = 0;
          maybeBumpWordConfidence(ex);   // raise saved-word confidence on correct answers
        } else {
          state.consecutiveWrong = (state.consecutiveWrong || 0) + 1;
          state.lastWrongExercise = ex;   // weak_word source for the Tutor handoff
          if (state.consecutiveWrong >= 2) maybeShowStruggle(state.lessons[lIdx]);
        }
      }

      // Lock all options, mark correct/wrong
      var opts = document.querySelectorAll('#s-' + lIdx + '-q-' + eIdx + ' .qopt');
      opts.forEach(function(btn, i) {
        btn.disabled = true;
        if (i === correctIdx) btn.classList.add('correct');
        else if (i === choiceIdx && !isCorrect) btn.classList.add('wrong');
      });

      // Feedback
      var fb  = document.getElementById('fb-'  + lIdx + '-' + eIdx);
      var ft  = document.getElementById('ft-'  + lIdx + '-' + eIdx);
      var fbb = document.getElementById('fbb-' + lIdx + '-' + eIdx);
      var fr  = document.getElementById('fr-'  + lIdx + '-' + eIdx);

      fb.classList.remove('ok','no');
      fb.classList.add('show', isCorrect ? 'ok' : 'no');
      ft.className = 'qft ' + (isCorrect ? 'ok' : 'no');
      ft.textContent = isCorrect ? '✓ Correct' : '✗ Not quite';
      fbb.textContent = ex.explanation || '';
      if (ex.rule_hint) {
        fr.textContent  = '💡 ' + ex.rule_hint;
        fr.style.display = '';
      } else {
        fr.style.display = 'none';
      }

      var nextBtn = document.getElementById('next-' + lIdx + '-' + eIdx);
      if (nextBtn) nextBtn.classList.add('show');

      if (isCorrect && first) {
        state.xp += XP_PER_CORRECT;
        document.getElementById('xpDisp').textContent = '⚡ ' + state.xp + ' XP';
        // Track per-lesson correct count for the score we'll persist
        // when the lesson hits its quiz-finish path (nextLesson).
        var lessonId = state.lessons[lIdx] && state.lessons[lIdx].id;
        if (lessonId) {
          state.correctByLesson[lessonId] = (state.correctByLesson[lessonId] || 0) + 1;
        }
      }

      // Warm success message after the LAST question of the lesson — fires
      // on the first answer regardless of correctness (the spec is about
      // completing the checkpoint, not about getting it right). The block
      // only exists on the last quiz step; otherwise this is a no-op.
      // When the lesson has a non-empty lernziel_completion, we additionally
      // reveal the outcome row ("✓ You can now…") in the same green pill —
      // no separate box, no second visual element.
      var lessonForCompletion = state.lessons[lIdx];
      var totalEx = (state.exercises[lessonForCompletion && lessonForCompletion.id] || []).length;
      if (first && eIdx === totalEx - 1) {
        var successBox      = document.getElementById('qs-'   + lIdx + '-' + eIdx);
        var successText     = document.getElementById('qst-'  + lIdx + '-' + eIdx);
        var outcomeBox      = document.getElementById('qsc-'  + lIdx + '-' + eIdx);
        var outcomeText     = document.getElementById('qsct-' + lIdx + '-' + eIdx);
        if (successBox && successText) {
          successText.textContent = pickQuizSuccessMessage();
          successBox.classList.add('show');
        }
        var completionText = (lessonForCompletion && lessonForCompletion.lernziel_completion &&
                              String(lessonForCompletion.lernziel_completion).trim()) || '';
        if (outcomeBox && outcomeText && completionText) {
          outcomeText.textContent = completionText;
          outcomeBox.classList.add('show');
        }
      }
    },

    /**
     * advance(lIdx, stepNum)
     *   stepNum 0 = content; 1..N = i-th question (0-indexed in state but 1-based in UI step naming).
     *   Goes to step `stepNum` within lesson lIdx; if past the last question, moves to next lesson;
     *   if past the last lesson, shows completion.
     */
    advance: function(lIdx, stepNum) {
      var lesson  = state.lessons[lIdx];
      var exCount = (state.exercises[lesson.id] || []).length;

      // Hide all steps in this lesson
      var screen = document.getElementById('lesson-' + lIdx);
      if (!screen) return;
      screen.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });

      if (stepNum === 0) {
        var contentStep = document.getElementById('s-' + lIdx + '-content');
        if (contentStep) contentStep.classList.add('active');
        // Note: stepNum=0 from advance() means "show quiz" since content's button calls advance(idx, 0)
        // before the user has progressed. We treat the *click* as "move past content".
        // Re-route: if there are exercises, show the first one; else move to next lesson.
        if (exCount > 0) {
          var first = document.getElementById('s-' + lIdx + '-q-0');
          if (first) {
            screen.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
            first.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
          }
        }
        // No exercises — advance to next lesson
        return this.nextLesson(lIdx);
      }

      // The Next button on quiz q-N calls advance(lIdx, N+1) — the encoded
      // intent is "show question stepNum, otherwise we're past the last and
      // should move on". Show q-stepNum if it exists; else next lesson.
      if (stepNum < exCount) {
        var nextStep = document.getElementById('s-' + lIdx + '-q-' + stepNum);
        if (nextStep) {
          nextStep.classList.add('active');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        return;
      }
      // Past last question — go to next lesson
      this.nextLesson(lIdx);
    },

    nextLesson: function(lIdx) {
      // The user finished lesson lIdx (either via the quiz flow or by clicking
      // "Next Lesson →" on a quiz-less lesson). Mark it complete before moving.
      markLessonComplete(state.lessons[lIdx]);

      var current = document.getElementById('lesson-' + lIdx);
      if (current) current.classList.remove('active');

      var nextIdx = lIdx + 1;
      if (nextIdx >= state.lessons.length) {
        this.complete();
        return;
      }

      state.lessonIdx = nextIdx;
      var nextScreen = document.getElementById('lesson-' + nextIdx);
      if (nextScreen) {
        nextScreen.classList.add('active');
        // Reset which step is active inside the new lesson
        nextScreen.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
        var firstStep = document.getElementById('s-' + nextIdx + '-content');
        if (firstStep) firstStep.classList.add('active');
        // Reset sequential blocks so the new lesson starts at block 0
        resetLessonBlocks(nextIdx);
      }
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    /**
     * Show/hide the full content of a collapsible explanation block.
     * Block IDs are generated in renderCollapsible() — the preview, full
     * content, and toggle button are id-{p,f,b} respectively.
     */
    toggleBlock: function(blockId) {
      var preview = document.getElementById(blockId + '-p');
      var full    = document.getElementById(blockId + '-f');
      var btn     = document.getElementById(blockId + '-b');
      if (!full || !btn) return;
      var open = full.classList.toggle('open');
      if (preview) preview.style.display = open ? 'none' : '';
      btn.textContent = open ? 'Show less ↑' : 'Show more ↓';
    },

    /**
     * Click handler for the "Weiter →" button on a lesson. The student has
     * read the content but is skipping the quiz — mark the source lesson
     * as 'in_progress' (won't downgrade if already completed), then jump.
     * Quiz-driven completion writes happen in nextLesson() instead.
     */
    weiter: function(fromIdx) {
      markLessonInProgress(state.lessons[fromIdx]);
      this.goToLesson(fromIdx + 1);
    },

    /**
     * Jump directly to a lesson by index (0-based). Used by clickable
     * progress dots and the explicit Prev nav. Bypasses quiz flow —
     * users can navigate freely without finishing every quiz first.
     * Does NOT mark anything complete (use weiter() for that).
     */
    goToLesson: function(targetIdx) {
      if (targetIdx < 0 || targetIdx >= state.lessons.length) return;

      // Hide the currently visible lesson
      state.lessons.forEach(function(_, i) {
        var s = document.getElementById('lesson-' + i);
        if (s) s.classList.remove('active');
      });

      state.lessonIdx = targetIdx;

      var target = document.getElementById('lesson-' + targetIdx);
      if (target) {
        target.classList.add('active');
        // Always start a freshly-jumped lesson on its content step
        target.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
        var first = document.getElementById('s-' + targetIdx + '-content');
        if (first) first.classList.add('active');
        // Reset sequential blocks so the lesson always starts at block 0
        resetLessonBlocks(targetIdx);
      }

      // Make sure the completion screen is hidden if we jump back from it
      var completion = document.getElementById('completeScreen');
      if (completion) completion.classList.remove('active');
      var lessonContainer = document.getElementById('lessonContainer');
      if (lessonContainer) lessonContainer.style.display = '';

      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    complete: function() {
      state.lessonIdx = state.lessons.length;
      updateProgress();
      document.getElementById('lessonContainer').style.display = 'none';
      var done = document.getElementById('completeScreen');
      done.classList.add('active');
      document.getElementById('xpEarnedFinal').textContent = state.xp;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    restart: function() {
      // Soft reset: restart from lesson 0 without re-fetching.
      state.lessonIdx = 0;
      state.xp = 0;
      state.answeredKeys = {};
      document.getElementById('lessonContainer').style.display = '';
      document.getElementById('completeScreen').classList.remove('active');
      document.getElementById('xpDisp').textContent = '⚡ 0 XP';

      state.lessons.forEach(function(_, i) {
        var screen = document.getElementById('lesson-' + i);
        if (!screen) return;
        screen.classList.toggle('active', i === 0);
        screen.querySelectorAll('.step').forEach(function(s, j) {
          s.classList.toggle('active', j === 0);
        });
      });

      // Re-enable any locked options
      document.querySelectorAll('.qopt').forEach(function(btn) {
        btn.disabled = false;
        btn.classList.remove('correct','wrong');
      });
      document.querySelectorAll('.qfeedback').forEach(function(fb) { fb.classList.remove('show'); });
      document.querySelectorAll('.qnext').forEach(function(b) { b.classList.remove('show'); });

      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };
})();
</script>
