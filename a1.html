  .nav{ position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.95); backdrop-filter:blur(10px);

  .nav .logo{ font-weight:800; font-size:18px; letter-spacing:-0.3px; color:var(--ink); text-decoration:none; }
  .nav .logo span{ color:var(--blue); }
  .nav .spacer{ flex:1; }
  .lang-toggle{ display:inline-flex; border:1.5px solid var(--line); border-radius:999px; overflow:hidden; background:#fff; }
  .lang-seg{ border:none; background:none; font-family:inherit; font-weight:800; font-size:13px; padding:7px 12px; cursor:pointer; color:var(--muted); }
  .lang-seg.active{ background:var(--blue); color:#fff; }
  .nav-cta{ display:none; background:var(--blue); color:#fff; text-decoration:none; font-weight:800; font-size:13px; padding:9px 14px; border-radius:10px; }
  @media(min-width:680px){ .nav-cta{ display:inline-block; } }

  .skip{ position:absolute; left:-9999px; top:0; background:var(--blue); color:#fff; padding:8px 14px; border-radius:0 0 8px 0; z-index:100; }
  .skip:focus{ left:0; }

  .wrap{ max-width:760px; margin:0 auto; padding:0 18px; }
  section{ padding:30px 0; border-bottom:1px solid var(--line); }
  section:last-of-type{ border-bottom:none; }
  h1{ font-size:30px; font-weight:800; letter-spacing:-0.6px; line-height:1.2; margin:0 0 12px; }
  h2{ font-size:22px; font-weight:800; letter-spacing:-0.3px; margin:0 0 12px; }
  h3{ font-size:17px; font-weight:800; margin:18px 0 6px; color:var(--blue-dark); }
  p{ margin:0 0 12px; }
  .muted{ color:var(--muted); }
  ul{ margin:0 0 12px; padding-left:0; list-style:none; }
  li{ position:relative; padding-left:26px; margin-bottom:8px; }
  li::before{ content:"›"; position:absolute; left:8px; color:var(--blue); font-weight:800; }
  .lead{ font-size:16px; }

  /* Hero */
  .hero{ background:linear-gradient(135deg,#1D4ED8 0%, #3B82F6 100%); color:#fff; border-bottom:none; }
  .hero .wrap{ padding-top:40px; padding-bottom:40px; }
  .hero h1{ color:#fff; }
  .hero .sub{ font-size:17px; color:rgba(255,255,255,0.92); max-width:560px; margin:0 0 22px; }
  .cta-row{ display:flex; flex-direction:column; gap:12px; align-items:flex-start; }
  .btn{ font-family:inherit; font-weight:800; text-decoration:none; cursor:pointer; border:none; border-radius:12px; text-align:center; transition:transform .1s, filter .15s; }
  .btn:active{ transform:scale(0.99); }
  .btn-primary{ background:#fff; color:var(--blue-dark); font-size:17px; padding:15px 24px; box-shadow:0 8px 24px rgba(0,0,0,0.18); width:100%; max-width:360px; }
  .btn-primary:hover{ filter:brightness(0.97); }
  .btn-secondary{ background:rgba(255,255,255,0.14); color:#fff; border:1.5px solid rgba(255,255,255,0.55); font-size:14px; padding:11px 18px; }
  .btn-tertiary{ background:none; color:#fff; font-size:14px; font-weight:700; padding:8px 4px; text-decoration:underline; text-underline-offset:3px; }
  .hero .trust{ margin-top:18px; font-size:13px; color:rgba(255,255,255,0.85); font-weight:600; }

  .module-card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:12px; }
  .module-card h3{ margin-top:0; }
  .pill-row{ display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 14px; }
  .pill{ background:#EFF6FF; color:var(--blue-dark); border:1px solid #DBEAFE; border-radius:999px; padding:5px 12px; font-size:13px; font-weight:700; }
  .week li{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 12px 10px 30px; }
  .week li::before{ left:12px; }
  .faq-item{ border:1px solid var(--line); border-radius:12px; background:#fff; margin-bottom:10px; padding:14px 16px; }
  .faq-item h3{ margin:0 0 6px; color:var(--ink); font-size:15.5px; }
  .faq-item p{ margin:0; color:var(--muted); font-size:14.5px; }
  .flex-note{ background:#FEFCE8; border:1px solid #FEF08A; border-radius:12px; padding:12px 14px; color:#713F12; font-size:14.5px; }
  .ew{ font-weight:800; color:var(--blue-dark); }

  .backtop{ display:inline-block; margin:24px 0 40px; color:var(--blue-dark); font-weight:700; text-decoration:none; font-size:14px; }
  footer{ text-align:center; padding:24px; color:var(--muted); font-size:13px; }

          'Writing tasks with ready-made templates and sentence building blocks',
          'Feedback on your texts through {EW} — in Practice Mode or Exam Pressure Mode',
          'One full mock exam in the A1 format',
          'Mini-tests so you can see your progress',
          'Help via chat and a place to ask questions'
        ],
        flex: 'You learn on your phone or laptop, whenever it suits you — even alongside work or studies. On busy days, a few minutes is enough; on free days, you can do more.'
      },

      faq: {
        h2: 'A1 Exam FAQ',
        items: [
          { q: 'How much German do I need before I start preparing for A1?',
            a: 'You can start from zero. A1 is the beginner level, and the plan assumes no prior knowledge. If you already know a few words, you will simply move through the first lessons a little faster.' },
          { q: 'How many points do I need to pass the A1 exam?',
            a: 'You need 60 out of 100 points — that is 60%. The points are spread across the 4 modules. The mini-tests and mock exam prepare you for exactly this, so you know where you stand beforehand.' },
          { q: 'Roughly how long does the Goethe A1 exam take?',
            a: 'The written part (Lesen, Hören, Schreiben) takes about an hour in total, and the speaking part (Sprechen) about 15 minutes, often in a small group. Plan a bit of extra time on exam day for organization.' },
          { q: 'Can I prepare with this program even if I have never taken a course?',
            a: 'Yes. The program is built exactly for that. Every lesson is simply explained, with lots of examples, and you go step by step — no prior course needed.' },
          { q: 'Do I always have to practice my writing tasks under time pressure?',
            a: 'No. With {EW}, you decide. In Practice Mode you write without a clock, whenever you have a few minutes — ideal for improving step by step. In Exam Pressure Mode you practice under the same timing as the real exam — ideal for checking, shortly before exam day, whether you are truly ready.' },
          { q: 'What happens if I fail — how do I improve then?',
            a: 'Failing is not the end — many people pass on the second attempt. With the mini-tests and mock exam, you can see exactly which module is still weak and focus your practice there. You will not redo everything, just the parts that are still costing you points.' }
        ]
      }
    }
  };

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(s){ return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  // {EW} placeholder → styled, untranslated "Exam Whisperer".
  function ew(s){ return esc(s).replace(/\{EW\}/g, '<span class="ew">Exam Whisperer</span>'); }
  function listHtml(items, cls){ return '<ul' + (cls ? ' class="' + cls + '"' : '') + '>' +
    items.map(function(i){ return '<li>' + ew(i) + '</li>'; }).join('') + '</ul>'; }
  function $(id){ return document.getElementById(id); }

  function render(lang){
    var c = CONTENT[lang] || CONTENT.de;
    document.documentElement.lang = c.htmlLang;
    document.title = c.title;

    // Nav / chrome
    $('skipLink').textContent = c.skip;
    $('logo').setAttribute('aria-label', c.logoAria);
    $('navCta').textContent = c.navCta;
    $('langToggle').setAttribute('aria-label', c.toggleAria);
    $('backTop').textContent = c.backTop;
    $('footerText').textContent = c.footer;

    // Hero
    $('heroH1').textContent  = c.hero.h1;
    $('heroSub').textContent = c.hero.sub;
    var p = $('ctaPrimary'), s = $('ctaSecondary'), t = $('ctaTertiary');
    p.textContent = c.hero.cta1; p.setAttribute('aria-label', c.hero.cta1Aria);
    s.textContent = c.hero.cta2; s.setAttribute('aria-label', c.hero.cta2Aria);
    t.textContent = c.hero.cta3; t.setAttribute('aria-label', c.hero.cta3Aria);
    $('heroTrust').textContent = c.hero.trust;

    // Overview
    $('ueberblick').innerHTML =
      '<h2>' + esc(c.overview.h2) + '</h2>' +
      '<p class="lead">' + esc(c.overview.intro) + '</p>' +
      '<p><strong>' + esc(c.overview.testedTitle) + '</strong></p>' +
      listHtml(c.overview.modules) +
      '<p><strong>' + esc(c.overview.structureTitle) + '</strong></p>' +
      listHtml(c.overview.structure);

    // Can do
    $('koennen').innerHTML =
      '<h2>' + esc(c.canDo.h2) + '</h2>' + listHtml(c.canDo.bullets);

    // Prep
    $('vorbereitung').innerHTML =
      '<h2>' + esc(c.prep.h2) + '</h2>' +
      '<p>' + esc(c.prep.intro) + '</p>' + listHtml(c.prep.bullets);

    // Modules
    $('module').innerHTML =
      '<h2>' + esc(c.modules.h2) + '</h2>' +
      c.modules.items.map(function(m){
        return '<div class="module-card"><h3>' + esc(m.h3) + '</h3>' +
          '<p>' + esc(m.intro) + '</p>' + listHtml(m.bullets) + '</div>';
      }).join('');

    // Plan
    $('lernplan').innerHTML =
      '<h2>' + esc(c.plan.h2) + '</h2>' +
      '<p>' + esc(c.plan.intro) + '</p>' +
      '<p><strong>' + esc(c.plan.weekTitle) + '</strong></p>' +
      listHtml(c.plan.week, 'week');

    // Offer
    $('angebot').innerHTML =
      '<h2>' + esc(c.offer.h2) + '</h2>' +
      listHtml(c.offer.bullets) +
      '<div class="flex-note">' + esc(c.offer.flex) + '</div>';

    // FAQ
    $('faq').innerHTML =
      '<h2>' + esc(c.faq.h2) + '</h2>' +
      c.faq.items.map(function(f){
        return '<div class="faq-item"><h3>' + esc(f.q) + '</h3><p>' + ew(f.a) + '</p></div>';
      }).join('');

    // Toggle active state
    $('segDe').classList.toggle('active', lang === 'de');
    $('segEn').classList.toggle('active', lang === 'en');
    try { localStorage.setItem('dw_a1_lang', lang); } catch (_) {}
  }

  // ── Init: default German; remember last choice ───────────────────────────
  var lang = 'de';
  try { var saved = localStorage.getItem('dw_a1_lang'); if (saved === 'en' || saved === 'de') lang = saved; } catch (_) {}

  $('langToggle').addEventListener('click', function(e){
    var b = e.target.closest('.lang-seg'); if (!b) return;
    lang = b.getAttribute('data-lang'); render(lang);
  });

  render(lang);
})();
</script>
</body>
</html>
