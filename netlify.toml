# DeutschWeg — Netlify configuration
# Serve all HTML files as static files — no SPA redirect

[build]
  publish = "."

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# Explicitly serve each module as a static file
# (prevents any SPA catch-all from intercepting navigation)
[[redirects]]
  from = "/module0-pronunciation"
  to = "/module0-pronunciation.html"
  status = 200

[[redirects]]
  from = "/module1-numbers"
  to = "/module1-numbers.html"
  status = 200

