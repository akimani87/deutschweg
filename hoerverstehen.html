<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hörverstehen — DeutschWeg</title>
<meta name="description" content="Practice the Goethe A1 listening exam with AI-generated German audio — announcements, conversations, and voicemails.">
<link rel="stylesheet" href="./deutschweg-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script src="./scoring-config.js?v=1"></script>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;background:#F8FAFC;color:#1F2937;padding-bottom:84px;
    font-family:"Plus Jakarta Sans","DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px;}
  .screen{display:none;} .screen.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .hd{background:linear-gradient(135deg,#1D4ED8 0%,#3B82F6 100%);color:#fff;border-radius:18px;padding:20px;text-align:center;margin-bottom:16px;}
  .hd .em{font-size:34px;} .hd h1{font-size:20px;font-weight:800;margin:6px 0 2px;letter-spacing:-0.3px;}
  .hd .sub{font-size:13px;color:rgba(255,255,255,0.9);font-weight:600;}

  /* Exercise cards */
  .ex-card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:16px;margin-bottom:12px;}
  .ex-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .ex-emoji{font-size:30px;}
  .ex-title{font-size:16px;font-weight:800;color:#1F2937;}
  .ex-meta{font-size:12px;color:#64748B;font-weight:600;margin-top:2px;}
  .ex-desc{font-size:13px;color:#475569;line-height:1.5;margin:4px 0 12px;}
  .ex-btns{display:flex;gap:8px;}
  .btn{flex:1;border:none;border-radius:12px;padding:11px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:filter .15s,transform .1s;}
  .btn:active{transform:scale(0.99);} .btn:disabled{opacity:0.55;cursor:default;}
  .btn-primary{background:#3B82F6;color:#fff;} .btn-primary:hover:not(:disabled){background:#2563EB;}
  .btn-ghost{background:#fff;border:1.5px solid #DBEAFE;color:#1D4ED8;}
  .btn-wide{width:100%;}

  /* Listening screen */
  .listen-card{background:#fff;border:1px solid #E5E7EB;border-radius:18px;padding:22px 18px;text-align:center;margin-bottom:14px;}
  .play-btn{width:96px;height:96px;border-radius:50%;border:none;background:#3B82F6;color:#fff;font-size:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 24px rgba(59,130,246,0.4);transition:transform .15s,background .15s;}
  .play-btn:hover:not(:disabled){background:#2563EB;transform:scale(1.04);}
  .play-btn:disabled{opacity:0.5;cursor:default;box-shadow:none;}
  .wave{display:flex;gap:4px;align-items:center;justify-content:center;height:30px;margin:14px 0 6px;}
  .wave span{width:5px;height:8px;background:#CBD5E1;border-radius:3px;}
  .wave.playing span{background:#3B82F6;animation:wv .9s ease-in-out infinite;}
  .wave.playing span:nth-child(2){animation-delay:.1s;} .wave.playing span:nth-child(3){animation-delay:.2s;}
  .wave.playing span:nth-child(4){animation-delay:.3s;} .wave.playing span:nth-child(5){animation-delay:.4s;}
  .wave.playing span:nth-child(6){animation-delay:.5s;} .wave.playing span:nth-child(7){animation-delay:.6s;}
  @keyframes wv{0%,100%{height:8px;}50%{height:26px;}}
  .listens{font-size:13px;font-weight:700;color:#64748B;}
  .replay-btn{margin-top:10px;background:#EFF6FF;color:#1D4ED8;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
  .replay-btn:disabled{opacity:0.45;cursor:default;}
  .scenario{font-size:13px;color:#94A3B8;margin-top:10px;font-style:italic;}

  .q{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:14px;margin-bottom:10px;}
  .q-text{font-size:15px;font-weight:700;color:#1F2937;margin-bottom:10px;line-height:1.4;}
  .opts{display:flex;flex-direction:column;gap:8px;}
  .opts.tf{flex-direction:row;}
  .opt{flex:1;background:#F8FAFC;border:1.5px solid #E5E7EB;border-radius:12px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;color:#1F2937;cursor:pointer;text-align:left;transition:all .15s;}
  .opts.tf .opt{text-align:center;font-size:16px;}
  .opt:hover:not(.locked){border-color:#3B82F6;background:#EFF6FF;}
  .opt.selected{border-color:#3B82F6;background:#3B82F6;color:#fff;}
  .opt.locked{cursor:default;}
  .opt .letter{display:inline-block;font-weight:800;color:#3B82F6;margin-right:8px;}
  .opt.selected .letter{color:#fff;}
  .questions-hidden{text-align:center;color:#94A3B8;font-size:14px;padding:20px;}

  /* Results */
  .score-hero{text-align:center;padding:6px 0;}
  .score-big{font-size:34px;font-weight:800;color:#1D4ED8;}
  .score-sub{font-size:14px;color:#64748B;font-weight:600;}
  .rev{background:#fff;border:1px solid #E5E7EB;border-radius:14px;padding:14px;margin-bottom:10px;}
  .rev-q{font-size:14px;font-weight:700;margin-bottom:6px;}
  .rev-line{font-size:13.5px;line-height:1.5;margin:2px 0;}
  .rev-ok{color:#15803D;font-weight:700;} .rev-bad{color:#DC2626;}
  .rev-exp{font-size:13px;color:#475569;margin-top:6px;line-height:1.5;}
  .tip{background:#FEFCE8;border:1px solid #FEF08A;border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.55;color:#713F12;margin-bottom:12px;}
  .notice{background:#fff;border:1px dashed #CBD5E1;border-radius:12px;padding:16px;font-size:14px;color:#475569;text-align:center;line-height:1.6;}
  .loading{text-align:center;color:#64748B;padding:30px;font-size:14px;}
  .spin{width:30px;height:30px;border:3px solid #DBEAFE;border-top-color:#3B82F6;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px;}
  @keyframes sp{to{transform:rotate(360deg);}}

  /* Bottom nav (7 items) */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E5E7EB;display:flex;justify-content:space-around;padding:10px 0 18px;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;border-radius:10px;transition:all .2s;border:none;background:none;color:#9CA3AF;text-decoration:none;flex:1;max-width:70px;}
  .nav-item:hover,.nav-item.active{color:#3B82F6;}
  .nav-icon{font-size:19px;line-height:1;} .nav-label{font-size:9.5px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;}
  @media (max-width:380px){ .nav-item{padding:6px 2px;} .nav-label{font-size:8.5px;letter-spacing:0;} }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── SCREEN 1: SELECTION ── -->
  <section class="screen active" id="screen-select">
    <div class="hd">
      <div class="em">🎧</div>
      <h1>Hörverstehen — A1</h1>
      <div class="sub">Train your ear for the Goethe A1 listening exam</div>
    </div>
    <div id="cards"></div>
  </section>

  <!-- ── SCREEN 2: LISTEN ── -->
  <section class="screen" id="screen-listen">
    <div class="listen-card">
      <button class="play-btn" id="playBtn" aria-label="Play audio">▶</button>
      <div class="wave" id="wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="listens" id="listens">3 of 3 listens remaining</div>
      <button class="replay-btn" id="replayBtn">↻ Replay</button>
      <div class="scenario" id="scenario"></div>
      <audio id="player" preload="auto"></audio>
    </div>
    <div id="questions"><div class="questions-hidden" id="qHidden">▶ Listen first, then the questions appear.</div></div>
    <button class="btn btn-primary btn-wide" id="submitBtn" style="display:none;">Submit answers</button>
  </section>

  <!-- ── SCREEN 3: RESULTS ── -->
  <section class="screen" id="screen-results">
    <div class="hd"><div class="em">🎯</div><h1>Your results</h1></div>
    <div class="listen-card">
      <div class="score-hero"><div class="score-big" id="scoreBig">0/0</div><div class="score-sub" id="scoreSub"></div></div>
    </div>
    <div class="tip" id="examTip"></div>
    <div id="review"></div>
    <button class="btn btn-primary btn-wide" id="tryAnother">Try another</button>
    <a class="btn btn-ghost btn-wide" href="/dashboard" style="display:block;text-align:center;text-decoration:none;margin-top:10px;">← Back to Modules</a>
  </section>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="/dashboard"><span class="nav-icon">📚</span><span class="nav-label">Modules</span></a>
  <a class="nav-item" href="ai-tutor.html"><span class="nav-icon">👩‍🏫</span><span class="nav-label">Tutor</span></a>
  <a class="nav-item" href="ai-pal.html"><span class="nav-icon">🤗</span><span class="nav-label">AI Pal</span></a>
  <a class="nav-item" href="dictionary.html"><span class="nav-icon">📖</span><span class="nav-label">Wörterbuch</span></a>
  <a class="nav-item active" href="hoerverstehen.html"><span class="nav-icon">🎧</span><span class="nav-label">Hören</span></a>
  <a class="nav-item" href="sprechen.html"><span class="nav-icon">🎤</span><span class="nav-label">Sprechen</span></a>
  <a class="nav-item" href="exam-vault.html"><span class="nav-icon">📝</span><span class="nav-label">Vault</span></a>
</nav>

<script>
(function(){
  'use strict';

  var API_BASE = 'https://deutschweg.onrender.com';
  var sb = (typeof dwSupabase !== 'undefined') ? dwSupabase : null;

  var TYPES = [
    { key:'announcement', emoji:'📢', title:'Announcements', mode:'True / False',      time:'~3 min',
      desc:'Public announcements — train station, supermarket, doctor, airport. Listen and tap Richtig or Falsch.' },
    { key:'conversation', emoji:'💬', title:'Conversations', mode:'Multiple Choice',   time:'~4 min',
      desc:'Two people in an everyday situation in Germany. Listen and pick the correct answer A, B or C.' },
    { key:'voicemail',    emoji:'📱', title:'Voicemail',     mode:'Find the Info',     time:'~3 min',
      desc:'A short voicemail with a name, time, place or phone number. Listen and tap the correct detail.' },
  ];
  var EXAM_TIPS = {
    announcement: 'Teil 1 tip: listen for key facts — times, platforms, prices, opening hours. The answer is often in the first sentence; the rest can be a distractor.',
    conversation: 'Teil 2 tip: focus on what the two speakers decide or agree. Wrong options often repeat a word you heard, so listen for the whole meaning, not single words.',
    voicemail:    'Teil 3 tip: jot down names, numbers and times the moment you hear them — voicemails are spoken once and the details come fast.',
  };

  var state = { user:null, exercise:null, type:null, listensUsed:0, maxListens:3, answers:{}, revealed:false };

  function $(id){ return document.getElementById(id); }
  function show(id){ ['screen-select','screen-listen','screen-results'].forEach(function(s){ $(s).classList.toggle('active', s===id); }); window.scrollTo(0,0); }
  function esc(s){ return String(s==null?'':s); }

  fetch(API_BASE + '/').catch(function(){});

  // ── Screen 1: cards + "times practiced" counts ───────────────────────────
  function renderCards(counts){
    var box = $('cards'); box.innerHTML = '';
    TYPES.forEach(function(tp){
      var n = (counts && counts[tp.key]) || 0;
      var card = document.createElement('div');
      card.className = 'ex-card';
      card.innerHTML =
        '<div class="ex-top"><div class="ex-emoji">' + tp.emoji + '</div>' +
          '<div><div class="ex-title">' + tp.title + '</div>' +
          '<div class="ex-meta">' + tp.mode + ' · ' + tp.time + ' · practiced ' + n + '×</div></div></div>' +
        '<div class="ex-desc">' + esc(tp.desc) + '</div>' +
        '<div class="ex-btns">' +
          '<button class="btn btn-primary" data-act="generate" data-type="' + tp.key + '">✨ Generate new</button>' +
          '<button class="btn btn-ghost" data-act="practice" data-type="' + tp.key + '">▶ Practice</button>' +
        '</div>';
      box.appendChild(card);
    });
  }

  function loadCounts(){
    renderCards({});
    if (!sb) return;
    sb.from('hoerverstehen_exercises').select('exercise_type, times_used').then(function(r){
      if (r.error || !r.data) return;
      var counts = {};
      r.data.forEach(function(row){ counts[row.exercise_type] = (counts[row.exercise_type]||0) + (row.times_used||0); });
      renderCards(counts);
    });
  }

  $('cards').addEventListener('click', function(e){
    var b = e.target.closest('button[data-act]'); if (!b) return;
    var act = b.getAttribute('data-act'), type = b.getAttribute('data-type');
    startExercise(act, type, b);
  });

  function startExercise(act, type, btn){
    state.type = type;
    var label = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = (act === 'generate' ? 'Generating…' : 'Loading…');
    fetch(API_BASE + '/api/hoerverstehen/' + (act === 'generate' ? 'generate' : 'practice'), {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ exercise_type: type })
    })
      .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, body:j }; }); })
      .then(function(res){
        btn.disabled = false; btn.innerHTML = label;
        if (res.ok && res.body && res.body.exercise){ openExercise(res.body.exercise); }
        else { alert((res.body && res.body.error) || 'Could not load the exercise. Please try again.'); }
      })
      .catch(function(){ btn.disabled = false; btn.innerHTML = label; alert('Connection problem. Please try again.'); });
  }

  // ── Screen 2: listen + answer ─────────────────────────────────────────────
  var player = $('player');

  function openExercise(ex){
    state.exercise = ex; state.listensUsed = 0; state.answers = {}; state.revealed = false;
    player.src = ex.audio_url;
    $('scenario').textContent = ex.scenario ? ('Scenario: ' + ex.scenario) : '';
    $('questions').innerHTML = '<div class="questions-hidden" id="qHidden">▶ Listen first, then the questions appear.</div>';
    $('submitBtn').style.display = 'none';
    updateListens();
    $('playBtn').disabled = false; $('replayBtn').disabled = true;
    $('playBtn').textContent = '▶';
    show('screen-listen');
  }

  function updateListens(){
    var remaining = Math.max(0, state.maxListens - state.listensUsed);
    $('listens').textContent = remaining + ' of ' + state.maxListens + ' listens remaining';
    var out = remaining <= 0;
    $('playBtn').disabled = out && player.paused;
    $('replayBtn').disabled = out || state.listensUsed === 0;
  }

  function playFromStart(){
    if (state.listensUsed >= state.maxListens) return;
    state.listensUsed++;
    try { player.currentTime = 0; } catch(_){}
    player.play().catch(function(){});
    updateListens();
    if (!state.revealed){ state.revealed = true; renderQuestions(); }
  }

  $('playBtn').addEventListener('click', function(){
    if (player.paused){
      if (state.listensUsed === 0) playFromStart();
      else if (player.currentTime > 0 && player.currentTime < player.duration) player.play().catch(function(){}); // resume a pause
      else playFromStart();
    } else { player.pause(); }
  });
  $('replayBtn').addEventListener('click', playFromStart);

  player.addEventListener('play',  function(){ $('wave').classList.add('playing'); $('playBtn').textContent = '⏸'; });
  player.addEventListener('pause', function(){ $('wave').classList.remove('playing'); $('playBtn').textContent = '▶'; });
  player.addEventListener('ended', function(){ $('wave').classList.remove('playing'); $('playBtn').textContent = '▶'; updateListens(); });

  function renderQuestions(){
    var qs = (state.exercise && state.exercise.questions) || [];
    var box = $('questions'); box.innerHTML = '';
    qs.forEach(function(q, qi){
      var opts = Array.isArray(q.options) && q.options.length ? q.options
        : (q.type === 'true_false' ? ['Richtig','Falsch'] : []);
      var isTf = q.type === 'true_false' || (opts.length === 2 && opts.indexOf('Richtig') !== -1);
      var div = document.createElement('div');
      div.className = 'q';
      var letters = ['A','B','C','D'];
      var optsHtml = opts.map(function(o, oi){
        var letter = (!isTf) ? '<span class="letter">' + letters[oi] + '</span>' : '';
        return '<button class="opt" data-q="' + qi + '" data-val="' + esc(o).replace(/"/g,'&quot;') + '">' + letter + esc(o) + '</button>';
      }).join('');
      div.innerHTML = '<div class="q-text">' + (qi+1) + '. ' + esc(q.question_text) + '</div>' +
                      '<div class="opts ' + (isTf ? 'tf' : '') + '">' + optsHtml + '</div>';
      box.appendChild(div);
    });
    box.querySelectorAll('.opt').forEach(function(btn){
      btn.addEventListener('click', function(){
        var qi = this.getAttribute('data-q');
        state.answers[qi] = this.getAttribute('data-val');
        // single-select per question
        this.parentNode.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('selected'); });
        this.classList.add('selected');
        if (Object.keys(state.answers).length === qs.length) $('submitBtn').style.display = 'block';
      });
    });
  }

  $('submitBtn').addEventListener('click', function(){
    try { player.pause(); } catch(_){}
    showResults();
  });

  // ── Screen 3: results ─────────────────────────────────────────────────────
  function showResults(){
    var qs = (state.exercise && state.exercise.questions) || [];
    var correct = 0;
    var rev = $('review'); rev.innerHTML = '';
    qs.forEach(function(q, qi){
      var given = state.answers[qi];
      var ok = String(given) === String(q.correct_answer);
      if (ok) correct++;
      var d = document.createElement('div');
      d.className = 'rev';
      var givenLine = ok
        ? '<div class="rev-line rev-ok">✓ ' + esc(given) + '</div>'
        : '<div class="rev-line rev-bad">✗ Your answer: ' + esc(given || '—') + '</div>' +
          '<div class="rev-line rev-ok">✓ Correct: ' + esc(q.correct_answer) + '</div>';
      d.innerHTML = '<div class="rev-q">' + (qi+1) + '. ' + esc(q.question_text) + '</div>' + givenLine +
        (q.explanation ? '<div class="rev-exp">💡 ' + esc(q.explanation) + '</div>' : '');
      rev.appendChild(d);
    });
    $('scoreBig').textContent = correct + '/' + qs.length;
    // Pass/fail line added per scoring-reconciliation-plan.md — this is a
    // NEW addition (Hören previously had no numeric threshold at all),
    // using the same canonical 60% as every other skill. The qualitative
    // encouragement message stays regardless of pass/fail since these are
    // short practice drills, not a full mock exam.
    var didPass = window.dwScoring ? window.dwScoring.passed(correct, qs.length) : null;
    var encouragement = correct === qs.length ? 'Perfect — sehr gut!' : (correct >= qs.length/2 ? 'Good work — keep practising!' : 'Keep going — you’ll get there.');
    $('scoreSub').textContent = (didPass === null ? encouragement : (didPass ? '✓ bestanden — ' : '') + encouragement);
    $('examTip').textContent = EXAM_TIPS[state.type] || '';
    show('screen-results');

    // Store result (own-row; best-effort).
    if (sb && state.user && state.exercise && state.exercise.id){
      sb.from('hoerverstehen_results').insert({
        user_id: state.user.id, exercise_id: state.exercise.id,
        score: correct, total: qs.length, answers_given: state.answers,
      }).then(function(){}, function(){});
    }
  }

  $('tryAnother').addEventListener('click', function(){ loadCounts(); show('screen-select'); });

  // ── Boot ───────────────────────────────────────────────────────────────────
  if (sb){
    sb.auth.getUser().then(function(res){ state.user = (res && res.data && res.data.user) || null; }).catch(function(){});
  }
  loadCounts();
})();
</script>
</body>
</html>
